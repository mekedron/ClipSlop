name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      HAS_HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_NOTARY_KEY_P8_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID signing certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          # Decode .p12 from base64
          echo -n "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create + unlock a temporary keychain for this run only
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the search list so codesign finds the identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import the .p12 and allow codesign / security tools to use the key
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Extract the Developer ID Application identity (e.g. "Developer ID Application: Foo Bar (TEAMID)")
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')

          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported .p12"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "Found signing identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          rm -f "$CERT_PATH"

      - name: Resolve packages
        run: swift package resolve

      - name: Build (Universal Binary)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Download Sparkle tools
        run: |
          # Download Sparkle release to get signing tools (sign_update)
          SPARKLE_VERSION=$(swift package show-dependencies --format json | python3 -c "
          import sys, json
          deps = json.load(sys.stdin)
          def find_sparkle(node):
              if 'sparkle' in node.get('identity', '').lower():
                  return node.get('version', '')
              for dep in node.get('dependencies', []):
                  result = find_sparkle(dep)
                  if result: return result
              return ''
          print(find_sparkle(deps))
          ")
          if [ -z "$SPARKLE_VERSION" ]; then
            echo "Could not detect Sparkle version, using 2.6.4"
            SPARKLE_VERSION="2.6.4"
          fi
          echo "Downloading Sparkle ${SPARKLE_VERSION} tools..."
          curl -L -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-dist
          tar xf sparkle.tar.xz -C sparkle-dist

      - name: Create .app bundle
        run: |
          APP_NAME="ClipSlop"
          APP_DIR="release/${APP_NAME}.app/Contents"

          mkdir -p "${APP_DIR}/MacOS"
          mkdir -p "${APP_DIR}/Resources"
          mkdir -p "${APP_DIR}/Frameworks"

          # Copy universal binary
          cp .build/apple/Products/Release/${APP_NAME} "${APP_DIR}/MacOS/${APP_NAME}"

          # Copy Info.plist
          cp SupportingFiles/Info.plist "${APP_DIR}/Info.plist"

          # Update version from tag
          TAG="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${TAG}" "${APP_DIR}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "${APP_DIR}/Info.plist"

          # Copy app icon
          cp SupportingFiles/AppIcon.icns "${APP_DIR}/Resources/AppIcon.icns"

          # Add icon reference to Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "${APP_DIR}/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "${APP_DIR}/Info.plist"

          # Copy all SPM resource bundles (ClipSlop, KeyboardShortcuts, etc.)
          RELEASE_DIR=".build/apple/Products/Release"
          for BUNDLE in $(find "$RELEASE_DIR" -name "*.bundle" -type d -maxdepth 1 2>/dev/null); do
            echo "Copying resource bundle: $(basename "$BUNDLE")"
            cp -R "$BUNDLE" "${APP_DIR}/Resources/"
          done
          # Fallback: if no bundles found in universal build dir, search entire .build
          if [ -z "$(find "${APP_DIR}/Resources" -name "*.bundle" -type d 2>/dev/null)" ]; then
            for BUNDLE in $(find .build -name "*_*.bundle" -type d -not -path "*/checkouts/*" -not -path "*/index-build/*" 2>/dev/null | sort -u); do
              echo "Copying resource bundle (fallback): $(basename "$BUNDLE")"
              cp -R "$BUNDLE" "${APP_DIR}/Resources/"
            done
          fi

          # Copy Sparkle.framework into the app bundle
          SPARKLE_FW=$(find .build -name "Sparkle.framework" -path "*/macos-arm64_x86_64/*" -type d 2>/dev/null | head -1)
          if [ -z "$SPARKLE_FW" ]; then
            SPARKLE_FW=$(find .build -name "Sparkle.framework" -type d 2>/dev/null | head -1)
          fi
          if [ -n "$SPARKLE_FW" ]; then
            cp -R "$SPARKLE_FW" "${APP_DIR}/Frameworks/"
            echo "Copied Sparkle.framework from ${SPARKLE_FW}"
          else
            echo "::warning::Sparkle.framework not found in .build artifacts"
          fi

          APP_PATH="release/${APP_NAME}.app"
          ENTITLEMENTS="SupportingFiles/ClipSlop.entitlements"

          if [ "$HAS_SIGNING" = "true" ]; then
            echo "Signing with Developer ID: $SIGNING_IDENTITY"
            SIGN_OPTS=(--force --timestamp --options runtime --keychain "$KEYCHAIN_PATH" --sign "$SIGNING_IDENTITY")

            # Resolve $(AppIdentifierPrefix) in the entitlements file to the real
            # team ID (extracted from the signing identity CN, e.g.
            # "Developer ID Application: Name (TEAMID)"). codesign does not do
            # this substitution itself — it would treat $(AppIdentifierPrefix)
            # as a literal access group name, which would not match anything.
            TEAMID=$(echo "$SIGNING_IDENTITY" | sed -E 's/.*\(([A-Z0-9]+)\)$/\1/')
            if [ -z "$TEAMID" ] || [ "$TEAMID" = "$SIGNING_IDENTITY" ]; then
              echo "::error::Could not extract Team ID from signing identity: $SIGNING_IDENTITY"
              exit 1
            fi
            RESOLVED_ENTITLEMENTS="$RUNNER_TEMP/entitlements-resolved.plist"
            sed "s/\$(AppIdentifierPrefix)/${TEAMID}./g" "$ENTITLEMENTS" > "$RESOLVED_ENTITLEMENTS"
            echo "Resolved entitlements (TeamID=${TEAMID}):"
            cat "$RESOLVED_ENTITLEMENTS"
            ENTITLEMENTS="$RESOLVED_ENTITLEMENTS"

            # Sign inside-out: nested helpers / XPC services / frameworks BEFORE the outer .app

            # Sparkle XPC services (Downloader.xpc, Installer.xpc) — present in Sparkle 2.x
            for xpc in "$APP_PATH"/Contents/Frameworks/Sparkle.framework/Versions/*/XPCServices/*.xpc; do
              [ -d "$xpc" ] && codesign "${SIGN_OPTS[@]}" "$xpc"
            done

            # Sparkle Updater.app (user-facing UI) and Autoupdate binary
            for helper in "$APP_PATH"/Contents/Frameworks/Sparkle.framework/Versions/*/Updater.app; do
              [ -d "$helper" ] && codesign "${SIGN_OPTS[@]}" "$helper"
            done
            for bin in "$APP_PATH"/Contents/Frameworks/Sparkle.framework/Versions/*/Autoupdate; do
              [ -f "$bin" ] && codesign "${SIGN_OPTS[@]}" "$bin"
            done

            # Sparkle framework itself
            if [ -d "$APP_PATH/Contents/Frameworks/Sparkle.framework" ]; then
              codesign "${SIGN_OPTS[@]}" "$APP_PATH/Contents/Frameworks/Sparkle.framework"
            fi

            # Finally, sign the .app with entitlements (this also re-signs the main executable)
            codesign "${SIGN_OPTS[@]}" --entitlements "$ENTITLEMENTS" "$APP_PATH"

            # Verify
            codesign --verify --strict --verbose=2 "$APP_PATH"
          else
            echo "::warning::No signing secrets configured — falling back to ad-hoc signature (Gatekeeper will warn)"
            codesign --force --deep --sign - "$APP_PATH"
          fi

          echo "App bundle created at $APP_PATH"

      - name: Notarize .app
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
        run: |
          APP_PATH="release/ClipSlop.app"
          KEY_PATH="$RUNNER_TEMP/notary.p8"
          ZIP_PATH="$RUNNER_TEMP/notarize.zip"

          echo -n "$MACOS_NOTARY_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"

          # notarytool needs a ZIP/DMG/PKG, not a raw .app — wrap and submit
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "Submitting .app to Apple notary..."
          xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait

          # Staple the ticket DIRECTLY to the .app so it survives extraction by Sparkle / etc.
          echo "Stapling notarization ticket to .app..."
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type exec --verbose=2 "$APP_PATH" || true

          rm -f "$KEY_PATH" "$ZIP_PATH"

      - name: Create DMG
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
        run: |
          APP_NAME="ClipSlop"
          TAG="${GITHUB_REF_NAME#v}"
          DMG_NAME="${APP_NAME}-${TAG}-macOS.dmg"

          mkdir -p dmg_contents
          cp -R "release/${APP_NAME}.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "${APP_NAME}" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "release/${DMG_NAME}"

          if [ "$HAS_SIGNING" = "true" ]; then
            # The DMG must be separately submitted to notarytool — stapler
            # queries Apple by the DMG's own SHA, not the contained .app's.
            # Without this submission the staple step fails with
            # "Record not found" / Error 65. The .app inside was stapled in
            # the previous step, which is what Sparkle relies on; the DMG
            # staple is for direct downloaders who'd otherwise hit an online
            # Gatekeeper check on first launch.
            KEY_PATH="$RUNNER_TEMP/notary-dmg.p8"
            echo -n "$MACOS_NOTARY_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"

            echo "Submitting DMG to Apple notary..."
            xcrun notarytool submit "release/${DMG_NAME}" \
              --key "$KEY_PATH" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait

            rm -f "$KEY_PATH"

            xcrun stapler staple "release/${DMG_NAME}"
            xcrun stapler validate "release/${DMG_NAME}"
          fi

          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_SHA256=$(shasum -a 256 "release/${DMG_NAME}" | awk '{print $1}')" >> $GITHUB_ENV
          echo "DMG created at release/${DMG_NAME}"

      - name: Sign DMG for Sparkle
        if: ${{ env.SPARKLE_PRIVATE_KEY != '' }}
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"

          # Write private key to temp file
          KEYFILE=$(mktemp)
          echo -n "${SPARKLE_PRIVATE_KEY}" > "$KEYFILE"

          # Sign the DMG
          SIGN_OUTPUT=$(sparkle-dist/bin/sign_update "release/${DMG_NAME}" --ed-key-file "$KEYFILE" 2>&1) || \
          SIGN_OUTPUT=$(sparkle-dist/bin/sign_update "release/${DMG_NAME}" -f "$KEYFILE" 2>&1) || \
          SIGN_OUTPUT=$(sparkle-dist/bin/sign_update "release/${DMG_NAME}" -s "${SPARKLE_PRIVATE_KEY}" 2>&1)

          rm -f "$KEYFILE"

          echo "sign_update output: ${SIGN_OUTPUT}"

          # Extract edSignature
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          FILE_LENGTH=$(stat -f%z "release/${DMG_NAME}")

          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Failed to extract edSignature from sign_update output"
            exit 1
          fi

          echo "ED_SIGNATURE=${ED_SIGNATURE}" >> $GITHUB_ENV
          echo "FILE_LENGTH=${FILE_LENGTH}" >> $GITHUB_ENV
          echo "Signed DMG: edSignature=${ED_SIGNATURE}, length=${FILE_LENGTH}"

      - name: Generate release notes
        run: |
          # BSD awk dies with "illegal byte sequence" on emoji commit subjects under the C locale
          export LC_ALL=en_US.UTF-8
          TAG="${GITHUB_REF_NAME#v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          # Find previous tag (exclude current)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          echo "Generating notes for range: ${RANGE}"

          # Collect commits grouped by type (skip chore: commits from CI)
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Skip CI-generated commits
            case "$msg" in
              chore:\ update\ appcast*) continue ;;
            esac
            # Strip type prefix for display
            CLEAN=$(echo "$msg" | sed 's/^[a-z]*: //' | sed 's/^[a-z]*(.*): //')
            CLEAN="$(echo "$CLEAN" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"

            case "$msg" in
              feat:*|feat\(*) FEATURES="${FEATURES}- ${CLEAN}\n" ;;
              fix:*|fix\(*)   FIXES="${FIXES}- ${CLEAN}\n" ;;
              chore:*|docs:*|ci:*|refactor:*|perf:*|test:*) OTHER="${OTHER}- ${CLEAN}\n" ;;
              *)              OTHER="${OTHER}- ${CLEAN}\n" ;;
            esac
          done <<< "$(git log ${RANGE} --pretty=format:'%s' --no-merges)"

          # Build release body
          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## What's New\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}## Other Changes\n${OTHER}\n"
          fi

          # Fallback if no categorized commits
          if [ -z "$BODY" ]; then
            BODY="Maintenance release.\n"
          fi

          # Add full changelog link
          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}**Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          else
            BODY="${BODY}**Full Changelog**: ${REPO_URL}/commits/${GITHUB_REF_NAME}"
          fi

          echo -e "$BODY" > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.DMG_NAME }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update appcast.xml
        if: ${{ env.ED_SIGNATURE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"

          # v1.x tags update the legacy appcast.xml (bundle id com.clipslop.app).
          # v2.x tags update appcast-v2.xml (bundle id com.mekedron.clipslop).
          # The two feeds are isolated so existing v1 installs never see a v2
          # DMG (which Sparkle would refuse to install due to bundle ID mismatch).
          case "$TAG" in
            1.*) APPCAST_FILE="appcast.xml" ;;
            2.*) APPCAST_FILE="appcast-v2.xml" ;;
            *)   APPCAST_FILE="appcast-v2.xml" ;;
          esac
          echo "Writing release info to ${APPCAST_FILE}"

          # Switch to main first, then generate appcast
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin main
          git checkout main

          cat > "${APPCAST_FILE}" << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>ClipSlop</title>
              <link>https://github.com/mekedron/clipslop</link>
              <description>ClipSlop updates</description>
              <language>en</language>
              <item>
                <title>Version ${TAG}</title>
                <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${TAG}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>$(date -R)</pubDate>
                <enclosure
                  url="https://github.com/mekedron/clipslop/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  length="${FILE_LENGTH}"
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          sed -i '' 's/^          //' "${APPCAST_FILE}"

          git add "${APPCAST_FILE}"
          git commit -m "chore: update ${APPCAST_FILE} for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push origin main

      - name: Update Homebrew Cask
        if: ${{ env.HAS_HOMEBREW_TOKEN == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, base64, urllib.request, os

          token = os.environ["HOMEBREW_TAP_TOKEN"]
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          sha256 = os.environ["DMG_SHA256"]

          cask = f'''cask "clipslop" do
            version "{tag}"
            sha256 "{sha256}"

            url "https://github.com/mekedron/clipslop/releases/download/v#{{version}}/ClipSlop-#{{version}}-macOS.dmg"
            name "ClipSlop"
            desc "Keyboard-first AI text pipeline for macOS"
            homepage "https://github.com/mekedron/ClipSlop"

            depends_on macos: ">= :sonoma"

            app "ClipSlop.app"

            zap trash: [
              "~/Library/Application Support/ClipSlop",
              "~/Library/Preferences/com.mekedron.clipslop.plist",
              "~/Library/Preferences/com.clipslop.app.plist",
            ]
          end
          '''

          api_url = "https://api.github.com/repos/mekedron/homebrew-tap/contents/Casks/clipslop.rb"
          headers = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          # Check if file exists to get its SHA
          req = urllib.request.Request(api_url, headers=headers)
          file_sha = ""
          try:
              resp = urllib.request.urlopen(req)
              file_sha = json.loads(resp.read()).get("sha", "")
          except urllib.error.HTTPError:
              pass  # File doesn't exist yet, will create

          body = {
              "message": f"chore: update ClipSlop to {tag}",
              "content": base64.b64encode(cask.encode()).decode(),
              "committer": {"name": "github-actions[bot]", "email": "github-actions[bot]@users.noreply.github.com"},
          }
          if file_sha:
              body["sha"] = file_sha

          req = urllib.request.Request(api_url, data=json.dumps(body).encode(), headers=headers, method="PUT")
          resp = urllib.request.urlopen(req)
          print(f"Homebrew cask updated to {tag} (status {resp.status})")
          PYEOF

      - name: Clean up signing keychain
        if: ${{ always() && env.KEYCHAIN_PATH != '' }}
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
